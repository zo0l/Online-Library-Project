     <h1 style="margin: 5px;">Online Library</h1>
     <p style="margin:5px;">Your Gateway to Knowledge</p>
 </header>

<div style="text-align:center; margin-top:30px;">

 <h2 style="color:#5B1E4A;">Create Your Account</h2>
 <p>Fill in the form below to register in the Online Library</p>

</div>
<div style="display:flex; justify-content:center; margin-top:20px;">

 <form action="index.html" style="
  background:white;
  padding:30px;
  width:350px;
  border-radius:10px;
  box-shadow:0px 0px 10px rgba(0,0,0,0.2);
  
 ">

 <label>Username</label>

 <input type="text" name="username" style="width:100%; padding:8px;"><br><br>
 <label>Email</label>
 <input type="email" name="email"  style="width:100%; padding:8px;"><br><br>

 <label>Password</label>
 <input type="password" name="password"  style="width:100%; padding:8px;"><br><br>

 <label>Confirm Password</label>
 <input type="password" name="confirm_password"  style="width:100%; padding:8px;"><br><br>


 <label>Account Type</label><br>
 <input type="radio" name="role" value="admin"> Admin
 <br>

 <input type="radio" name="role" value="user"> User

 <br><br>

 <button type="submit" style="
 width:100%;
 padding:10px;
 background-color:#7A2E63;
 color:white;
 border:none;
 cursor:pointer;
 ">
 
 Create Account
 
 </button>
 <br><br>

 <p style="text-align: center;">
    Already have an account?

 </p>
 <a href="login.html" style="color:#7A2E63;text-decoration:none;">
    Login here
 </a>
 </form>

 </div>

 </body>
