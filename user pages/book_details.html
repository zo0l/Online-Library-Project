<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Library - Book Details</title>
    <link rel="stylesheet" href="borrowed_details.css">
</head>
<body>
    <header>
        <h1>Online Library</h1>
        <p>Book Information</p>
    </header>

    <nav>
        <a href="user_dashboard.html">Dashboard</a>
        <a href="search.html">Search Books</a>
        <a href="borrowed_books.html">My Borrowed Books</a>
        <a href="../index.html">Logout</a>
    </nav>

    <main class="details-container">
        <div class="book-details-card" id="bookDetailsCard">
            <h2 id="bookTitle">Loading...</h2>
            
            <div class="book-info">
                <p><strong>Author:</strong> <span id="bookAuthor">-</span></p>
                <p><strong>Category:</strong> <span id="bookCategory">-</span></p>
                <p><strong>ISBN:</strong> <span id="bookISBN">-</span></p>
                <p><strong>Publication Year:</strong> <span id="bookYear">-</span></p>
                <p><strong>Status:</strong> <span id="bookStatus">-</span></p>
            </div>
            
            <div class="book-description">
                <h3>Description</h3>
                <p id="bookDescription">Loading description...</p>
            </div>

            <div id="alertMessage" class="alert-message"></div>

            <button id="borrowBtn" class="borrow-btn">Borrow This Book</button>
        </div>
    </main>

    <footer>
        <p>© 2026 Online Library | IS231 - Web Technology</p>
    </footer>

    <script src="js/book-details.js"></script>
</body>
</html>
