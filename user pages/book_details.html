<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Library - Book Details</title>
</head>
<body style="margin:0; padding:0; font-family:Arial, sans-serif; background-color: #f4f4f4;">
    <header style="background-color:#5B1E4A; color: white; text-align: center; padding: 15px;">
        <h1 style="margin: 5px;">Online Library</h1>
        <p style="margin:5px;">Book Information</p>
    </header>

    <nav style="background-color:#7A2E63; padding:10px; text-align:center;">
        <a href="user_dashboard.html" style="color:white; text-decoration:none; margin: 20px;">Dashboard</a>
        <a href="search.html" style="color:white; text-decoration:none; margin: 20px;">Search Books</a>
        <a href="borrowed_books.html" style="color:white; text-decoration:none; margin: 20px;">My Borrowed Books</a>
        <a href="../login.html" style="color:white; text-decoration:none; margin: 20px;">Logout</a>
    </nav>

    <section style="display: flex; justify-content: center; padding: 40px 20px;">
        <div style="background-color: white; padding: 30px; border-radius: 8px; width: 100%; max-width: 600px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1);">
            <h2 style="color: #5B1E4A; border-bottom: 2px solid #7A2E63; padding-bottom: 10px;">Book Title</h2>
            
            <p><strong>Author:</strong> Author Name</p>
            <p><strong>Category:</strong> Department</p>
            <p><strong>ISBN:</strong> xxxxxxxx</p>
            <p><strong>Status:</strong> <span style="color: green; font-weight: bold;">Available</span></p>
            
            <div style="margin-top: 20px;">
                <h3 style="color: #5B1E4A;">Description</h3>
                <p style="line-height: 1.6; color: #333;">
                   description
                </p>
            </div>

            <form action="borrowed_books.html" style="margin-top: 30px;">
                <button type="submit" style="background-color: #5B1E4A; color: white; padding: 15px; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%;">
                    Borrow This Book
                </button>
            </form>
        </div>
    </section>

    <footer style="background-color:#5B1E4A; color:white; text-align:center; padding:1px; position: fixed; bottom: 0; width: 100%;">
        <p>© 2026 Online Library | IS231 - Web Technology</p>
    </footer>
</body>
</html>
