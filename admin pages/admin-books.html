<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Books - Admin</title>

    <link rel="stylesheet" href="admin-style.css">
</head>
<body>

    <div class="header">
        <h1>Online Library</h1>
        <p>Your Gateway to Knowledge</p>
    </div>

    <div class="navbar">
        <a href="../index.html" style="color:white; text-decoration:none; margin: 20px;">Home</a>
        <a href="admin-books.html" style="color:white; text-decoration:none; margin:20px;">List of Books</a>
        <a href="admin-dashboard.html" style="color:white; text-decoration:none; margin:20px;">Dashboard</a>
    </div>

    <div class="page-wrapper">

        <div class="sidebar">
            <a href="admin-dashboard.html">Dashboard</a>
            <a href="admin-books.html">All Books</a>
            <a href="add-book.html">Add Book</a>
            <a href="../index.html">Logout</a>
        </div>

        <div class="content">

            <div class="top-bar">
                <h2>All Books</h2>
                <a href="add-book.html" class="btn-add">+ Add New Book</a>
            </div>

            <div class="filters">
                <input type="text" id="searchInput" placeholder="Search by title or author..." onkeyup="filterTable()">

                <select id="genreSelect" onchange="filterTable()">
                    <option value="">All Genres</option>
                    <option value="Fiction">Fiction</option>
                    <option value="Science">Science</option>
                    <option value="History">History</option>
                    <option value="Technology">Technology</option>
                    <option value="Philosophy">Philosophy</option>
                </select>

                <select id="statusSelect" onchange="filterTable()">
                    <option value="">All Status</option>
                    <option value="Available">Available</option>
                    <option value="Borrowed">Borrowed</option>
                    <option value="Unavailable">Unavailable</option>
                </select>
            </div>

            <table id="booksTable">
                <tbody>

                </tbody>
            </table>

        </div>
        </div>
    <div class="footer">
        &copy; 2026 Online Library | IS231 - Web Technology
    </div>

    <script>
        // This function runs every time the user types in search
        // or changes the genre / status dropdowns
        function filterTable() {

            // get what the user typed or selected
            var searchText  = document.getElementById("searchInput").value.toLowerCase();
            var genreValue  = document.getElementById("genreSelect").value.toLowerCase();
            var statusValue = document.getElementById("statusSelect").value.toLowerCase();

            // get all rows in the table
            var table = document.getElementById("booksTable");
            var rows  = table.getElementsByTagName("tr");

            // loop through each row (skip row 0 because that is the header)
            for (var i = 1; i < rows.length; i++) {

                var cells = rows[i].getElementsByTagName("td");

                // get the text of each column we need
                var title  = cells[1].innerText.toLowerCase();
                var author = cells[2].innerText.toLowerCase();
                var genre  = cells[3].innerText.toLowerCase();
                var status = cells[6].innerText.toLowerCase();

                // check if this row matches all filters
                var matchSearch = title.includes(searchText) || author.includes(searchText);
                var matchGenre  = (genreValue  == "") || (genre  == genreValue);
                var matchStatus = (statusValue == "") || (status == statusValue);

                // show or hide the row
                if (matchSearch && matchGenre && matchStatus) {
                    rows[i].style.display = "";
                } else {
                    rows[i].style.display = "none";
                }
            }
        }

        // This function runs when the user clicks Delete on a row
        function deleteRow(button) {
            var confirmed = confirm("Are you sure you want to delete this book?");

            if (confirmed) {
                // go up from button -> td -> tr, then remove the row
                var row = button.parentNode.parentNode;
                row.parentNode.removeChild(row);
            }
        }
    </script>

    <script src="../JS_Files/dbase.js"></script>
    <script src="../JS_Files/admin.js"></script>
</body>
</html>
