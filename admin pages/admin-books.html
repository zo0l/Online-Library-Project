<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Books - Admin</title>

    <style>

        /* ---- General ---- */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ddb6d9;
        }


        /* ---- Header ---- */
        .header {
            background-color: #6b0f4b;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 30px;
        }

        .header p {
            margin: 5px 0 0 0;
            font-size: 14px;
        }


        /* ---- Navigation Bar ---- */
        .navbar {
            background-color: #8b1a6b;
            text-align: center;
            padding: 10px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-size: 15px;
        }

        .navbar a:hover {
            text-decoration: underline;
        }


        /* ---- Page Layout ---- */
        .page-wrapper {
            display: flex;
        }


        /* ---- Sidebar ---- */
        .sidebar {
            width: 200px;
            background-color: #3d0a27;
            min-height: 100vh;
            padding-top: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            font-size: 14px;
        }

        .sidebar a:hover {
            background-color: #5c0e3c;
        }


        /* ---- Main Content Area ---- */
        .content {
            flex: 1;
            padding: 30px;
        }


        /* ---- Top bar: title + Add Book button ---- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .top-bar h2 {
            color: #6b0f4b;
            margin: 0;
        }

        .btn-add {
            background-color: #6b0f4b;
            color: white;
            padding: 9px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-add:hover {
            background-color: #4a0a35;
        }


        /* ---- Search and Filter inputs ---- */
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .filters input {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
            width: 250px;
        }

        .filters select {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
        }


        /* ---- Books Table ---- */
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
        }

        table th {
            background-color: #6b0f4b;
            color: white;
            padding: 10px;
            text-align: left;
            font-size: 13px;
        }

        table td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            font-size: 13px;
        }

        table tr:hover {
            background-color: #f9f0f5;
        }


        /* ---- Status text colors ---- */
        .available   { color: green;  font-weight: bold; }
        .borrowed    { color: orange; font-weight: bold; }
        .unavailable { color: red;    font-weight: bold; }


        /* ---- Edit and Delete buttons ---- */
        .btn-edit {
            background-color: #6b0f4b;
            color: white;
            padding: 5px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            text-decoration: none;
            margin-right: 5px;
        }

        .btn-edit:hover {
            background-color: #4a0a35;
        }

        .btn-delete {
            background-color: white;
            color: red;
            padding: 5px 12px;
            border: 1px solid red;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-delete:hover {
            background-color: red;
            color: white;
        }


        /* ---- Footer ---- */
        .footer {
            background-color: #6b0f4b;
            color: white;
            text-align: center;
            padding: 12px;
            font-size: 13px;
        }

    </style>
</head>
<body>


    <!-- Header -->
    <div class="header">
        <h1>Online Library</h1>
        <p>Your Gateway to Knowledge</p>
    </div>


    <!-- Navigation Bar -->
    <div class="navbar">
        <a href="../index.html"
           style="color:white; text-decoration:none; margin: 20px;">
            Home
        </a>


        <a href="admin-books.html"
           style="color:white;
       text-decoration:none;
       margin:20px;">
            List of Books
        </a>

        <a href="admin-dashboard.html"
           style="color:white;
       text-decoration:none;
       margin:20px;">
            Dashboard
        </a>
    </div>


    <!-- Page Wrapper -->
    <div class="page-wrapper">


        <!-- Sidebar -->
        <div class="sidebar">
            <a href="admin-dashboard.html">Dashboard</a>
            <a href="admin-books.html">All Books</a>
            <a href="add-book.html">Add Book</a>
            <a href="../index.html">Logout</a>
        </div>


        <!-- Main Content -->
        <div class="content">


            <!-- Page title and Add button -->
            <div class="top-bar">
                <h2>All Books</h2>
                <a href="add-book.html" class="btn-add">+ Add New Book</a>
            </div>


            <!-- Search and filter controls -->
            <div class="filters">
                <input type="text" id="searchInput" placeholder="Search by title or author..." onkeyup="filterTable()">

                <select id="genreSelect" onchange="filterTable()">
                    <option value="">All Genres</option>
                    <option value="Fiction">Fiction</option>
                    <option value="Science">Science</option>
                    <option value="History">History</option>
                    <option value="Technology">Technology</option>
                    <option value="Philosophy">Philosophy</option>
                </select>

                <select id="statusSelect" onchange="filterTable()">
                    <option value="">All Status</option>
                    <option value="Available">Available</option>
                    <option value="Borrowed">Borrowed</option>
                    <option value="Unavailable">Unavailable</option>
                </select>
            </div>


            <!-- Books table -->
            <table id="booksTable">
                <tbody>

                </tbody>
            </table>


        </div>
        <!-- end content -->

    </div>
    <!-- end page-wrapper -->


    <!-- Footer -->
    <div class="footer">
        &copy; 2026 Online Library | IS231 - Web Technology
    </div>


    <script>

        // This function runs every time the user types in search
        // or changes the genre / status dropdowns
        function filterTable() {

            // get what the user typed or selected
            var searchText  = document.getElementById("searchInput").value.toLowerCase();
            var genreValue  = document.getElementById("genreSelect").value.toLowerCase();
            var statusValue = document.getElementById("statusSelect").value.toLowerCase();

            // get all rows in the table
            var table = document.getElementById("booksTable");
            var rows  = table.getElementsByTagName("tr");

            // loop through each row (skip row 0 because that is the header)
            for (var i = 1; i < rows.length; i++) {

                var cells = rows[i].getElementsByTagName("td");

                // get the text of each column we need
                var title  = cells[1].innerText.toLowerCase();
                var author = cells[2].innerText.toLowerCase();
                var genre  = cells[3].innerText.toLowerCase();
                var status = cells[6].innerText.toLowerCase();

                // check if this row matches all filters
                var matchSearch = title.includes(searchText) || author.includes(searchText);
                var matchGenre  = (genreValue  == "") || (genre  == genreValue);
                var matchStatus = (statusValue == "") || (status == statusValue);

                // show or hide the row
                if (matchSearch && matchGenre && matchStatus) {
                    rows[i].style.display = "";
                } else {
                    rows[i].style.display = "none";
                }
            }
        }


        // This function runs when the user clicks Delete on a row
        function deleteRow(button) {

            var confirmed = confirm("Are you sure you want to delete this book?");

            if (confirmed) {
                // go up from button -> td -> tr, then remove the row
                var row = button.parentNode.parentNode;
                row.parentNode.removeChild(row);
            }
        }

    </script>

    <script src="../JS_Files/dbase.js"></script>
    <script src="../JS_Files/admin.js"></script>
</body>
</html>
